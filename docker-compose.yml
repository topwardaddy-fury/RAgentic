version: "3.8"

services:
  ragentic-app:
    # Verified Image Digest: node@sha256:e4bf2a82ad0a4037d28035ae71529873c069b13eb0455466ae0bc13363826e34
    build:
      context: .
      dockerfile: Dockerfile
    image: ragentic-app:latest
    security_opt:
      - no-new-privileges:true
    container_name: security_verified_ragentic
    restart: unless-stopped
    ports:
      - "3333:3333"
    healthcheck:
      test: [ "CMD", "node", "-e", "process.exit(0)" ]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  security-sentinel:
    image: aquasec/trivy:latest
    container_name: ragentic-sentinel
    restart: unless-stopped
    depends_on:
      - ragentic-app
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - trivy-cache:/root/.cache/
    entrypoint: /bin/sh
    command: >
      -c "while true; do 
            echo '🛡️ RAgentic Sentinel: Initiating Security Audit...';
            trivy image --severity CRITICAL,HIGH --no-progress ragentic-app:latest;
            echo '✅ Audit Complete. Next scan in 4 hours.';
            sleep 14400; 
          done"

volumes:
  trivy-cache:
